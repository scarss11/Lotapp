<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Restablecer Contraseña — Portal del Sol</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-box">
    <div class="auth-logo"><h1>🏡 Portal del Sol</h1><p>Nueva contraseña</p></div>
    <div class="form-group">
      <label>Nueva contraseña</label>
      <input type="password" id="pass1" placeholder="Mínimo 8 caracteres">
    </div>
    <div class="form-group">
      <label>Confirmar contraseña</label>
      <input type="password" id="pass2" placeholder="Repite tu contraseña">
    </div>
    <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="doReset()">Actualizar Contraseña</button>
  </div>
</div>
<div class="toast-container"></div>
<script src="../js/app.js"></script>
<script>
const token = new URLSearchParams(window.location.search).get('token');
if (!token) {
  showToast('Token inválido', 'error');
  setTimeout(() => window.location.href = '/login', 2000);
}

async function doReset() {
  const pass1 = document.getElementById('pass1').value;
  const pass2 = document.getElementById('pass2').value;
  if (pass1.length < 8) return showToast('Mínimo 8 caracteres', 'warning');
  if (pass1 !== pass2)  return showToast('Las contraseñas no coinciden', 'error');
  const d = await api('/api/auth/reset-password', 'POST', { token, password: pass1 });
  showToast(d.message, d.success ? 'success' : 'error');
  if (d.success) setTimeout(() => window.location.href = '/login', 1500);
}
</script>
</body>
</html>
