<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PQRS — LotesApp</title>
<link rel="stylesheet" href="../css/style.css">
<script>history.pushState(null,'',window.location.href);window.addEventListener('popstate',()=>history.pushState(null,'',window.location.href));</script>
</head>
<body>
<div class="app-layout">
  <button class="sidebar-toggle" id="sidebarToggle"><svg viewBox="0 0 24 24" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div><div class="sidebar-brand-text">LotesApp</div><div class="sidebar-brand-sub">Gestión Inmobiliaria</div></div>
    </div>
    <div class="sidebar-section"><ul class="sidebar-nav">
      <li><a href="/dashboard"><div class="nav-icon icon-blue"><svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>Dashboard</a></li>
      <li><a href="/lotes"><div class="nav-icon icon-green"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>Lotes</a></li>
      <li><a href="/pagos"><div class="nav-icon icon-orange"><svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>Mis Pagos</a></li>
      <li><a href="/pqrs" class="active"><div class="nav-icon icon-purple"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>PQRS</a></li>
      <li><a href="/proyecto"><div class="nav-icon icon-teal"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>El Proyecto</a></li>
    </ul></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section"><ul class="sidebar-nav">
      <li><a href="#" onclick="logout();return false;" style="color:var(--red);"><div class="nav-icon icon-red"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>Cerrar Sesión</a></li>
    </ul></div>
  </aside>
  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div><h1>PQRS</h1><p>Peticiones, Quejas, Reclamos y Sugerencias</p></div>
      <button class="btn btn-primary" onclick="openModal('modalPqrs')">+ Nueva PQRS</button>
    </div>
    <div id="pqrsContainer"><p style="color:var(--sub);">Cargando...</p></div>
  </main>
</div>
<div class="modal-overlay" id="modalPqrs">
  <div class="modal">
    <div class="modal-header"><h3>Nueva PQRS</h3><button class="modal-close" onclick="closeModal('modalPqrs')">×</button></div>
    <div class="form-group"><label>Tipo</label>
      <select id="pqrsTipo"><option value="peticion">Petición</option><option value="queja">Queja</option><option value="reclamo">Reclamo</option><option value="sugerencia">Sugerencia</option></select>
    </div>
    <div class="form-group"><label>Asunto</label><input type="text" id="pqrsAsunto" placeholder="Resumen breve..."></div>
    <div class="form-group"><label>Descripción</label><textarea id="pqrsDesc" rows="4" placeholder="Detalla tu solicitud..."></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('modalPqrs')">Cancelar</button>
      <button class="btn btn-primary" id="btnEnviarPqrs">Enviar</button>
    </div>
  </div>
</div>
<div class="toast-container"></div>
<script src="../js/app.js"></script>
<script>
(async()=>{const u=await checkSession();if(!u){window.location.replace('/login');return;}loadPqrs();})();
async function loadPqrs(){
  const d=await api('/api/pqrs/mis-pqrs');
  const c=document.getElementById('pqrsContainer');
  if(!d.success||!d.pqrs.length){c.innerHTML='<div class="card" style="text-align:center;padding:40px;"><p style="font-size:2rem;">💬</p><p style="color:var(--sub);">No has enviado PQRS aún.</p></div>';return;}
  c.innerHTML=d.pqrs.map(p=>`
  <div class="card" style="margin-bottom:16px;">
    <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
      <div><strong>${p.asunto}</strong><span style="font-size:12px;color:var(--sub);margin-left:8px;">${p.tipo}</span></div>
      ${estadoBadge(p.estado)}
    </div>
    <p style="color:var(--sub);font-size:14px;margin-bottom:8px;">${p.descripcion}</p>
    ${p.respuesta?`<div style="background:rgba(52,199,89,.08);border-left:3px solid var(--green);padding:10px 14px;border-radius:8px;margin-top:8px;font-size:14px;"><strong>Respuesta:</strong> ${p.respuesta}</div>`:''}
    <p style="font-size:12px;color:var(--sub);margin-top:8px;">${formatDate(p.created_at)}</p>
  </div>`).join('');
}
document.getElementById('btnEnviarPqrs').addEventListener('click',async()=>{
  const d=await api('/api/pqrs','POST',{tipo:document.getElementById('pqrsTipo').value,asunto:document.getElementById('pqrsAsunto').value,descripcion:document.getElementById('pqrsDesc').value});
  if(d.success){showToast('PQRS enviada correctamente','success');closeModal('modalPqrs');loadPqrs();}
  else showToast(d.message||'Error','error');
});
</script>
</body>
</html>
