<!DOCTYPE html>
<html lang="es"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PQRS — LotesApp</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
  <button class="sidebar-toggle" id="sidebarToggle"><svg viewBox="0 0 24 24" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div><div class="sidebar-brand-text">LotesApp</div><div class="sidebar-brand-sub">Gestión Inmobiliaria</div></div>
    </div>
    <div class="sidebar-section"><ul class="sidebar-nav">
      <li><a href="/dashboard"><div class="nav-icon icon-blue"><svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>Dashboard</a></li>
      <li><a href="/lotes"><div class="nav-icon icon-green"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>Lotes</a></li>
      <li><a href="/pagos"><div class="nav-icon icon-orange"><svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>Mis Pagos</a></li>
      <li><a href="/pqrs" class="active"><div class="nav-icon icon-purple"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>PQRS</a></li>
      <li><a href="/proyecto"><div class="nav-icon icon-teal"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>El Proyecto</a></li>
    </ul></div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section"><ul class="sidebar-nav">
      <li><a href="#" onclick="logout();return false;" style="color:var(--red);"><div class="nav-icon icon-red"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>Cerrar Sesión</a></li>
    </ul></div>
  </aside>

  <main class="main-content">
    <div class="page-header" style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;">
      <div><h1>PQRS</h1><p>Peticiones, Quejas, Reclamos y Sugerencias</p></div>
      <button class="btn btn-primary" onclick="openModal('modalPqrs')">+ Nueva PQRS</button>
    </div>

    <div class="table-wrap">
      <table>
        <thead><tr><th>Tipo</th><th>Asunto</th><th>Descripción</th><th>Estado</th><th>Fecha</th><th>Respuesta</th></tr></thead>
        <tbody id="pqrsTable"><tr><td colspan="6" style="text-align:center;color:var(--sub);">Cargando...</td></tr></tbody>
      </table>
    </div>
  </main>
</div>

<!-- Modal Nueva PQRS -->
<div class="modal-overlay" id="modalPqrs">
  <div class="modal">
    <div class="modal-header"><h3>Nueva PQRS</h3><button class="modal-close" onclick="closeModal('modalPqrs')">×</button></div>
    <div class="form-group"><label>Tipo</label>
      <select id="pqrsTipo">
        <option value="peticion">Petición</option>
        <option value="queja">Queja</option>
        <option value="reclamo">Reclamo</option>
        <option value="sugerencia">Sugerencia</option>
      </select>
    </div>
    <div class="form-group"><label>Asunto *</label><input type="text" id="pqrsAsunto" placeholder="Resumen breve..."></div>
    <div class="form-group"><label>Descripción *</label><textarea id="pqrsDesc" rows="4" placeholder="Detalla tu solicitud..."></textarea></div>
    <div style="display:flex;gap:10px;justify-content:flex-end;">
      <button class="btn btn-secondary" onclick="closeModal('modalPqrs')">Cancelar</button>
      <button class="btn btn-primary" id="btnEnviarPqrs">Enviar</button>
    </div>
  </div>
</div>

<!-- Modal Ver Respuesta -->
<div class="modal-overlay" id="modalRespuesta">
  <div class="modal">
    <div class="modal-header"><h3>Respuesta del Administrador</h3><button class="modal-close" onclick="closeModal('modalRespuesta')">×</button></div>
    <div id="respuestaDetalle"></div>
    <div style="display:flex;justify-content:flex-end;margin-top:16px;">
      <button class="btn btn-primary" onclick="closeModal('modalRespuesta')">Cerrar</button>
    </div>
  </div>
</div>

<div class="toast-container"></div>
<script src="../js/app.js"></script>
<script>
(async()=>{
  const u=await checkSession();
  if(!u) return;
  loadPqrs();
})();

async function loadPqrs(){
  const d=await api('/api/pqrs/mis-pqrs');
  const tb=document.getElementById('pqrsTable');
  if(!d.success||!d.pqrs.length){
    tb.innerHTML='<tr><td colspan="6" style="text-align:center;color:var(--sub);padding:32px;">No has enviado PQRS aún.</td></tr>';
    return;
  }
  tb.innerHTML=d.pqrs.map(p=>`<tr>
    <td><span style="font-size:12px;background:rgba(175,82,222,.12);color:#AF52DE;padding:3px 8px;border-radius:6px;font-weight:600;">${p.tipo}</span></td>
    <td><strong>${p.asunto}</strong></td>
    <td style="font-size:13px;color:var(--sub);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${p.descripcion}</td>
    <td>${estadoBadge(p.estado)}</td>
    <td style="font-size:13px;">${formatDate(p.created_at)}</td>
    <td>
      ${p.respuesta
        ? `<button class="btn btn-sm btn-success" onclick="verRespuesta('${p.asunto.replace(/'/g,"\\'")}','${p.respuesta.replace(/'/g,"\\'").replace(/\n/g,' ')}','${formatDate(p.fecha_respuesta||p.created_at)}')">Ver Respuesta</button>`
        : '<span style="color:var(--sub);font-size:13px;">Pendiente</span>'}
    </td>
  </tr>`).join('');
}

function verRespuesta(asunto, respuesta, fecha){
  document.getElementById('respuestaDetalle').innerHTML=`
    <div style="background:var(--bg);border-radius:10px;padding:14px;margin-bottom:16px;">
      <p style="font-weight:700;margin-bottom:4px;">${asunto}</p>
    </div>
    <div style="background:rgba(52,199,89,.08);border-left:3px solid var(--green);padding:14px 16px;border-radius:8px;">
      <p style="font-size:13px;color:var(--sub);margin-bottom:8px;">Respuesta recibida el ${fecha}</p>
      <p style="font-size:15px;line-height:1.6;">${respuesta}</p>
    </div>`;
  openModal('modalRespuesta');
}

document.getElementById('btnEnviarPqrs').addEventListener('click', async()=>{
  const tipo=document.getElementById('pqrsTipo').value;
  const asunto=document.getElementById('pqrsAsunto').value.trim();
  const desc=document.getElementById('pqrsDesc').value.trim();
  if(!asunto||!desc){showToast('Completa todos los campos','warning');return;}
  const d=await api('/api/pqrs','POST',{tipo,asunto,descripcion:desc});
  if(d.success){
    showToast('✅ PQRS enviada correctamente','success');
    closeModal('modalPqrs');
    document.getElementById('pqrsAsunto').value='';
    document.getElementById('pqrsDesc').value='';
    loadPqrs();
  } else showToast(d.message||'Error','error');
});
</script>
</body>
</html>
