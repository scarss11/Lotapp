<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"><meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate"><meta http-equiv="Pragma" content="no-cache">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Proyectos — LotesApp</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>
<div class="app-layout">
  <button class="sidebar-toggle" id="sidebarToggle">
    <svg viewBox="0 0 24 24" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="sidebar-backdrop" id="sidebarBackdrop"></div>
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-brand">
      <div class="sidebar-brand-icon"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
      <div><div class="sidebar-brand-text">LotesApp</div><div class="sidebar-brand-sub">Gestión Inmobiliaria</div></div>
    </div>
    <div class="sidebar-section">
      <ul class="sidebar-nav">
        <li><a href="/dashboard"><div class="nav-icon icon-blue"><svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg></div>Dashboard</a></li>
        <li><a href="/lotes"><div class="nav-icon icon-green"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>Lotes</a></li>
        <li><a href="/pagos"><div class="nav-icon icon-orange"><svg viewBox="0 0 24 24" stroke-width="1.8"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div>Mis Pagos</a></li>
        <li><a href="/pqrs"><div class="nav-icon icon-purple"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg></div>PQRS</a></li>
        <li><a href="/proyecto" class="active"><div class="nav-icon icon-teal"><svg viewBox="0 0 24 24" stroke-width="1.8"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/><polyline points="2 12 12 17 22 12"/></svg></div>El Proyecto</a></li>
      </ul>
    </div>
    <div class="sidebar-divider"></div>
    <div class="sidebar-section"><ul class="sidebar-nav">
      <li><a href="#" onclick="logout();return false;" style="color:var(--red);"><div class="nav-icon icon-red"><svg viewBox="0 0 24 24" stroke-width="1.8"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>Cerrar Sesión</a></li>
    </ul></div>
  </aside>

  <main class="main-content">
    <div class="page-header"><h1>Proyectos</h1><p>Información de los proyectos habitacionales</p></div>
    <div id="proyectosContainer"><p style="color:var(--sub);">Cargando...</p></div>
  </main>
</div>
<div class="toast-container"></div>
<script src="../js/app.js"></script>
<script>
(async()=>{
  const u=await checkSession();
  if(!u) return;

  const d = await api('/api/proyecto');
  if(!d.success){document.getElementById('proyectosContainer').innerHTML='<p style="color:var(--sub);">Error cargando proyectos</p>';return;}

  // Cargar lotes del cliente para mostrar su estado (#5)
  const misLotesData = await api('/api/lotes/cliente/mis-lotes');
  const misLotes = misLotesData.success ? (misLotesData.lotes || []) : [];

  const icons={completada:'✅',activa:'🔵',pendiente:'⏳'};
  const colors={completada:'var(--green)',activa:'var(--blue)',pendiente:'var(--sub)'};

  const cont=document.getElementById('proyectosContainer');
  if(!d.proyectos.length){cont.innerHTML='<div class="card" style="text-align:center;padding:40px;"><p style="color:var(--sub);">No hay proyectos registrados.</p></div>';return;}

  // Helper: banner de estado del cliente para este proyecto
  function bannerEstadoCliente(proyectoId) {
    const lotesEnProyecto = misLotes.filter(l => l.proyecto_id === proyectoId);
    if (!lotesEnProyecto.length) return '';
    return lotesEnProyecto.map(l => {
      let icono = '📋', color = 'var(--blue)', msg = '';
      const pagado = Number(l.pagado || 0);
      const total  = Number(l.precio_total || 0);
      const saldo  = Number(l.saldo || 0);
      const pct    = total > 0 ? Math.round((pagado / total) * 100) : 0;
      if (l.lote_estado === 'vendido' && pagado >= total) {
        icono = '🏆'; color = 'var(--green)';
        msg = `Lote <strong>${l.codigo}</strong> — <span style="color:var(--green);">✅ Pago completado</span>`;
      } else if (pagado > 0) {
        icono = '💳'; color = 'var(--orange)';
        msg = `Lote <strong>${l.codigo}</strong> — <span style="color:var(--orange);">En pago</span>: ${pct}% pagado (${formatCOP(pagado)} de ${formatCOP(total)})`;
      } else {
        icono = '📝'; color = 'var(--blue)';
        msg = `Lote <strong>${l.codigo}</strong> — <span style="color:var(--blue);">Lote asignado</span>. Pendiente de primer pago.`;
      }
      return `<div style="background:linear-gradient(135deg,${color}15,${color}08);border:1.5px solid ${color}40;border-radius:12px;padding:14px 18px;margin-bottom:12px;display:flex;align-items:center;gap:12px;">
        <span style="font-size:22px;">${icono}</span>
        <div>
          <div style="font-size:13px;font-weight:700;color:${color};margin-bottom:2px;">Tu estado en este proyecto</div>
          <div style="font-size:13px;">${msg}</div>
          ${total > 0 && pagado < total ? `
          <div style="margin-top:8px;background:var(--border);border-radius:100px;height:6px;width:200px;max-width:100%;">
            <div style="background:${color};height:6px;border-radius:100px;width:${pct}%;transition:width .5s;"></div>
          </div>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  cont.innerHTML=d.proyectos.map(p=>{
    let galeria=[];
    try{galeria=JSON.parse(p.galeria||'[]');}catch(_){}
    const etapasProy=d.etapas.filter(e=>e.proyecto_id===p.id);
    return `
    <div class="card" style="margin-bottom:32px;padding:0;overflow:hidden;">
      <!-- Galería -->
      ${galeria.length>=2?`
        <div class="gallery-grid" style="padding:0;">
          ${galeria.slice(0,4).map((img,i)=>`<img src="${img}" alt="Proyecto" style="${i===0?'grid-column:1/-1;height:320px;':'height:180px;'} object-fit:cover;">`).join('')}
        </div>` : galeria.length===1?`<img src="${galeria[0]}" style="width:100%;height:280px;object-fit:cover;">`:
        `<div style="width:100%;height:200px;background:linear-gradient(135deg,#007AFF22,#34C75922);display:flex;align-items:center;justify-content:center;">
          <svg viewBox="0 0 24 24" stroke-width="1" style="width:60px;height:60px;stroke:#007AFF55;fill:none;"><polygon points="12 2 2 7 12 12 22 7"/><polyline points="2 17 12 22 22 17"/></svg>
        </div>`}

      <div style="padding:28px;">
        <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:16px;">
          <div>
            <h2 style="font-size:1.6rem;">${p.nombre}</h2>
            ${p.inmobiliaria?`<p style="color:var(--blue);font-weight:700;font-size:14px;">🏢 ${p.inmobiliaria}</p>`:''}
          </div>
          <div style="text-align:right;">
            ${p.ubicacion?`<p style="color:var(--sub);font-size:14px;">📍 ${p.ubicacion}</p>`:''}
            ${p.area_total?`<p style="color:var(--sub);font-size:13px;">📐 ${Number(p.area_total).toLocaleString()} m² totales</p>`:''}
          </div>
        </div>
        ${p.descripcion?`<p style="color:var(--sub);margin-bottom:24px;line-height:1.7;">${p.descripcion}</p>`:''}

        <!-- Estado del cliente en este proyecto (#5) -->
        ${bannerEstadoCliente(p.id)}

        ${etapasProy.length?`
        <h3 style="margin-bottom:16px;font-size:1.1rem;">Etapas del Proyecto</h3>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;">
          ${etapasProy.map((e,i)=>`
          <div style="border:2px solid ${colors[e.estado]};border-radius:12px;padding:16px;">
            <div style="display:flex;justify-content:space-between;margin-bottom:6px;">
              <span style="font-weight:800;color:${colors[e.estado]};font-size:22px;">0${i+1}</span>
              <span style="font-size:18px;">${icons[e.estado]}</span>
            </div>
            <strong style="font-size:15px;">${e.nombre}</strong>
            <p style="color:var(--sub);font-size:13px;margin-top:4px;">${e.descripcion||''}</p>
            <div style="margin-top:10px;">${estadoBadge(e.estado)}</div>
          </div>`).join('')}
        </div>`:''}
      </div>
    </div>`;
  }).join('');
})();
</script>
</body>
</html>
